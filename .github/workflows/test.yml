name: tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pytest + pyyaml
        run: python -m pip install --upgrade pip pytest pyyaml
      - name: Mount repo at ~/.claude/skills/assemble
        # 20+ tests resolve assets via `Path.home() / ".claude/skills/assemble"`,
        # and `inventory.enumerate_skill_paths` rejects resolved paths that
        # escape the `~/.claude` tree via symlink. So we copy the workspace
        # rather than symlink it — `cp -R` keeps the resolved path inside
        # `~/.claude/skills/assemble/`, which `_under()` accepts.
        run: |
          mkdir -p "$HOME/.claude/skills"
          cp -R "$GITHUB_WORKSPACE" "$HOME/.claude/skills/assemble"
      - name: Run tests
        run: python -m pytest tests -v --ignore=tests/dogfood
