name: tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pytest + pyyaml
        run: python -m pip install --upgrade pip pytest pyyaml
      - name: Mount repo at ~/.claude/skills/assemble
        # 20+ tests resolve assets via `Path.home() / ".claude/skills/assemble"`.
        # Symlinking the workspace there lets unit + contract tests run unchanged
        # in CI without introducing a separate path-resolution shim.
        run: |
          mkdir -p "$HOME/.claude/skills"
          ln -s "$GITHUB_WORKSPACE" "$HOME/.claude/skills/assemble"
      - name: Run tests
        run: python -m pytest tests -v --ignore=tests/dogfood
